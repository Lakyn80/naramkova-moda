<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .alert.fade-out { opacity: 1; transition: opacity 1s ease-in-out; }
        .alert.fade-out.hide { opacity: 0; }
        .flash-placeholder { min-height: 70px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('admin.dashboard') }}">🛒 Admin</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.list_products') }}">📦 Produkty</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.list_categories') }}">📂 Kategorie</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.sold_products') }}">📊 Prodané</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.admin_payments_index') }}">💳 Platby</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.logout') }}">🚪 Odhlásit</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="flash-placeholder">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade-out show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Zavřít"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        setTimeout(() => {
            document.querySelectorAll('.alert.fade-out').forEach(alert => {
                alert.classList.add('hide');
                setTimeout(() => alert.remove(), 1000);
            });
        }, 3000);
    </script>
</body>
</html>
