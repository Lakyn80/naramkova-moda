{% extends "shared/layout.html" %}

{% block title %}Přidat produkt{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="mb-4">📦 Přidat nový produkt</h2>

  <form method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
    <!-- Název produktu -->
    <div class="mb-3">
      <label for="name" class="form-label">Název produktu</label>
      <input
        type="text"
        class="form-control"
        name="name"
        id="name"
        placeholder="Např. Náramek pro maminku"
        required
      >
      <div class="form-text">Zadej jasný a výstižný název produktu.</div>
    </div>

    <!-- Popis -->
    <div class="mb-3">
      <label for="description" class="form-label">Popis</label>
      <textarea
        class="form-control"
        name="description"
        id="description"
        rows="4"
        placeholder="Popis produktu, použití, materiál apod."
      ></textarea>
    </div>

    <!-- Cena -->
    <div class="mb-3">
      <label for="price" class="form-label">Cena (Kč)</label>
      <input
        type="number"
        step="0.01"
        class="form-control"
        name="price"
        id="price"
        required
        placeholder="Např. 199.00"
      >
    </div>

    <!-- Kategorie -->
    <div class="mb-3">
      <label for="category_id" class="form-label">Kategorie</label>
      <select name="category_id" id="category_id" class="form-select" required>
        <option value="">-- Vyber kategorii --</option>
        {% for category in categories %}
          <option value="{{ category.id }}">{{ category.name }}</option>
        {% endfor %}
      </select>
    </div>

    <!-- Hlavní obrázek (volitelný) -->
    <div class="mb-3">
      <label for="image" class="form-label">Hlavní obrázek (volitelný)</label>
      <input
        type="file"
        class="form-control"
        name="image"
        id="image"
        accept="image/*"
      >
      <div class="form-text">Např. úvodní miniatura produktu.</div>
    </div>

    <!-- Další média (obrázky nebo videa) -->
    <div class="mb-3">
      <label for="media" class="form-label">Další obrázky nebo videa</label>
      <input
        type="file"
        class="form-control"
        name="media"
        id="media"
        multiple
        accept="image/*,video/*"
      >
      <div class="form-text">Můžeš přidat více obrázků nebo videí najednou.</div>
    </div>

    <!-- Tlačítka -->
    <div class="d-flex justify-content-between align-items-center mt-4">
      <button type="submit" class="btn btn-success">
        💾 Uložit produkt
      </button>
      <a href="{{ url_for('admin.list_products') }}" class="btn btn-secondary">
        Zpět na přehled produktů
      </a>
    </div>
  </form>
</div>
{% endblock %}
