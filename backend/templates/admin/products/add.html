{% extends "shared/layout.html" %}
{% block title %}Přidat produkt{% endblock %}

{% block content %}
<h1 class="h3 mb-3">➕ Přidat produkt</h1>

<form action="{{ url_for('admin.add_product') }}" method="post" enctype="multipart/form-data" class="needs-validation" novalidate>
  <div class="mb-3">
    <label class="form-label">Název produktu</label>
    <input type="text" name="name" class="form-control" placeholder="Např. Náramek pro maminku" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Popis</label>
    <textarea name="description" class="form-control" rows="5" placeholder="Popis produktu, použití, materiál apod."></textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Cena (Kč)</label>
    <input type="number" step="0.01" min="0" name="price" class="form-control" placeholder="Např. 199.00" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Kategorie</label>
    <select name="category_id" class="form-select" required>
      <option value="" selected disabled>-- Vyber kategorii --</option>
      {% for c in categories %}
        <option value="{{ c.id }}">{{ (c.group or "—") ~ " — " ~ c.name }}</option>
      {% endfor %}
    </select>
    <div class="form-text">Do backendu se odešle ID kategorie (ne text).</div>
  </div>

  <div class="mb-3">
    <label class="form-label">Úvodní obrázek</label>
    <input type="file" name="image" class="form-control" accept="image/*">
  </div>

  <div class="mb-4">
    <label class="form-label">Další obrázky nebo videa</label>
    <input type="file" name="media" class="form-control" accept="image/*,video/*" multiple>
  </div>

  <div class="d-flex flex-wrap gap-2">
    <a href="{{ url_for('admin.list_products') }}" class="btn btn-outline-secondary">Zpět</a>
    <button type="submit" class="btn btn-primary">Uložit</button>
  </div>
</form>
{% endblock %}
