{% extends "shared/layout.html" %}
{% block content %}
<h2>✏️ Úprava produktu</h2>

<form method="post" enctype="multipart/form-data">
  <div class="mb-3">
    <label for="name" class="form-label">Název</label>
    <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
  </div>

  <div class="mb-3">
    <label for="description" class="form-label">Popis</label>
    <textarea class="form-control" id="description" name="description">{{ product.description }}</textarea>
  </div>

  <div class="mb-3">
    <label for="price" class="form-label">Cena (Kč)</label>
    <input type="number" step="0.01" class="form-control" id="price" name="price" value="{{ product.price_czk }}" required>
  </div>

  <div class="mb-3">
    <label for="category_id" class="form-label">Kategorie</label>
    <select class="form-select" id="category_id" name="category_id">
      <option value="">Bez kategorie</option>
      {% for category in categories %}
        <option value="{{ category.id }}" {% if product.category_id == category.id %}selected{% endif %}>
          {{ category.name }}
        </option>
      {% endfor %}
    </select>
  </div>

  <div class="mb-3">
    <label for="image" class="form-label">Obrázek</label>
    {% if product.image %}
      <p>Aktuální obrázek: <img src="{{ url_for('static', filename='uploads/' ~ product.image) }}" height="80"></p>
    {% endif %}
    <input type="file" class="form-control" id="image" name="image">
  </div>

  <button type="submit" class="btn btn-success">💾 Uložit změny</button>
  <a href="{{ url_for('admin.list_products') }}" class="btn btn-secondary">↩️ Zpět</a>
</form>
{% endblock %}
