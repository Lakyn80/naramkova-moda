services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile.backend
    container_name: naramkova-backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    expose:
      - "5001"
    environment:
      - PYTHONPATH=/app

  frontend:
    image: node:20-alpine
    container_name: naramkova-frontend-builder
    working_dir: /app
    environment:
      VITE_API_BASE_URL: /api
    volumes:
      - ./frontend:/app
      - frontend_dist:/app/dist
    command: sh -c "npm ci && npm run build"

  nginx:
    image: nginx:latest
    container_name: naramkova-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "8082:80"
    volumes:
      - frontend_dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  frontend_dist:
